name: Build podcast feed

# Runs when you upload a new saved page (any .html), or manually from the Actions tab.
on:
  push:
    branches: [ main ]
    paths: [ "*.html", "*.htm" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python build_feed.py
      - name: Commit updated feed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add feed.xml
          if git diff --staged --quiet; then
            echo "No changes to feed."
          else
            git commit -m "Rebuild feed from saved page"
            git push
          fi
